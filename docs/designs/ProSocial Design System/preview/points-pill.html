<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Points pill</title></head><body>
<style>
  .pill { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:999px; font:600 14px 'Archivo',sans-serif; }
  .pill-empty { background:#e8f4fc; color:#4a6080; }
  .pill-active { background:rgba(10,40,82,0.1); color:#0a2852; }
  .pill-done { background:#f0fdf4; color:#059669; }
</style>
<div class="card">
  <div class="row" style="gap:10px">
    <span class="pill pill-empty">0 pts</span>
    <span class="pill pill-active">14 pts</span>
    <span class="pill pill-active">47 pts</span>
    <span class="pill pill-active">108</span>
    <span class="pill pill-done">All done! <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
  </div>
</div>
</body></html>
