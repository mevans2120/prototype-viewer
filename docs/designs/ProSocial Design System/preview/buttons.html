<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Buttons</title></head><body>
<style>
  .btn { font-family:'Archivo',sans-serif; font-weight:600; border-radius:6px; border:0; cursor:pointer; transition:all .15s; }
  .btn-primary { background:#0a2852; color:#fff; padding:10px 20px; font-size:14px; }
  .btn-primary:hover { background:#071d3e; }
  .btn-outline { background:#fff; color:#0a2852; border:1px solid #c8ddf0; padding:10px 20px; font-size:14px; }
  .btn-hero { background:#0a2852; color:#fff; padding:16px 24px; font-size:16px; font-weight:700; border-radius:10px; width:100%; }
  .btn-sm { padding:6px 12px; font-size:12px; background:#0a2852; color:#fff; }
</style>
<div class="card">
  <div class="row" style="gap:12px">
    <button class="btn btn-primary">Primary · Get Started</button>
    <button class="btn btn-outline">Outline · Cancel</button>
    <button class="btn btn-sm">Small</button>
  </div>
  <button class="btn btn-hero">Hero CTA — full-width bold</button>
</div>
</body></html>
