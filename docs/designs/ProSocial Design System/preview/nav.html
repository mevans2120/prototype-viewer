<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Nav bar</title></head><body>
<style>
  body { padding:0; background:#f5f7fa; }
  .nav { border-bottom:1px solid #c8ddf0; background:#fff; padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between; }
  .logo { display:flex; align-items:center; gap:10px; font:600 17px 'Archivo'; color:#0a2852; }
  .mark { width:28px; height:28px; background:#0a2852; border-radius:6px; display:flex; align-items:center; justify-content:center; color:#fff; }
  .right { display:flex; align-items:center; gap:12px; }
  .pill { background:rgba(10,40,82,0.1); color:#0a2852; padding:4px 10px; border-radius:999px; font:600 14px 'Archivo'; }
  .av { width:32px; height:32px; border-radius:50%; background:#e8f4fc; font:600 12px 'Archivo'; color:#4a6080; display:flex; align-items:center; justify-content:center; }
</style>
<div class="nav">
  <div class="logo"><div class="mark"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>Prosocial Banking</div>
  <div class="right"><span class="pill">32 pts</span><div class="av">KN</div></div>
</div>
</body></html>
