<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Shadows</title></head><body>
<div class="card">
  <div class="row" style="gap:20px">
    <div class="swatch"><div class="chip" style="background:#fff;border:none;box-shadow:0 2px 12px rgba(10,40,82,0.08)"></div><div class="label">brand-glow</div><div class="sub">Sticky nav, pills</div></div>
    <div class="swatch"><div class="chip" style="background:#fff;border:none;box-shadow:0 4px 20px rgba(10,40,82,0.06)"></div><div class="label">card-hover</div><div class="sub">Card hover lift</div></div>
    <div class="swatch"><div class="chip" style="background:#fff;border:none;box-shadow:0 8px 32px rgba(10,40,82,0.12)"></div><div class="label">elevated</div><div class="sub">Popovers, menus</div></div>
    <div class="swatch"><div class="chip" style="background:#fff;border:none;box-shadow:0 20px 60px rgba(28,25,23,0.15),0 4px 16px rgba(28,25,23,0.08)"></div><div class="label">dialog</div><div class="sub">Modals</div></div>
  </div>
</div>
</body></html>
