<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Leaderboard</title></head><body>
<style>
  .lb { background:#fff; border:1px solid #c8ddf0; border-radius:10px; overflow:hidden; font-family:'Source Sans 3',sans-serif; }
  .lb-head { padding:14px 20px 12px; border-bottom:1px solid #e8f4fc; font:700 12px 'Archivo',sans-serif; color:#7d93ab; letter-spacing:1.5px; text-transform:uppercase; }
  .lb-row { display:flex; align-items:center; gap:10px; padding:10px 20px; font-size:14px; color:#0a2852; }
  .lb-row.me { background:rgba(10,40,82,0.05); border-left:3px solid #0a2852; padding-left:17px; }
  .rank { width:22px; text-align:center; font-weight:500; color:#4a6080; font-size:13px; }
  .av { width:28px; height:28px; border-radius:50%; background:#e8f4fc; font:600 12px 'Archivo'; color:#4a6080; display:flex; align-items:center; justify-content:center; }
  .nm { flex:1; font-weight:500; }
  .pt { font-weight:600; color:#0a2852; }
</style>
<div class="lb">
  <div class="lb-head">Leaderboard</div>
  <div class="lb-row"><div class="rank">🥇</div><div class="av">SM</div><div class="nm">Sara M.</div><div class="pt">47</div></div>
  <div class="lb-row"><div class="rank">🥈</div><div class="av">JR</div><div class="nm">Jordan R.</div><div class="pt">38</div></div>
  <div class="lb-row me"><div class="rank">🥉</div><div class="av">KN</div><div class="nm">Kai N. (you)</div><div class="pt">32</div></div>
  <div class="lb-row"><div class="rank">4</div><div class="av">MP</div><div class="nm">Maya P.</div><div class="pt">24</div></div>
</div>
</body></html>
