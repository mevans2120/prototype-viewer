<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Inputs</title></head><body>
<style>
  .fld { position:relative; margin-bottom:12px; }
  .fld input { width:100%; padding:18px 14px 8px; border:1px solid #c8ddf0; border-radius:10px; font:400 15px 'Source Sans 3'; color:#0a2852; background:#fff; outline:none; transition:border-color .15s; }
  .fld input:focus { border-color:#0a2852; }
  .fld label { position:absolute; left:14px; top:6px; font:600 11px 'Archivo'; color:#7d93ab; letter-spacing:0.02em; pointer-events:none; }
  .tag { display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:999px; background:rgba(232,244,252,0.4); color:#7d93ab; font-size:13px; }
</style>
<div class="card">
  <div class="fld"><label>Email</label><input value="sara@iowaforall.org" readonly></div>
  <div class="fld"><label>Display name</label><input value="Sara M." readonly></div>
  <div class="row" style="gap:8px;flex-wrap:wrap">
    <span class="tag">#iowa</span>
    <span class="tag">#healthcare</span>
    <span class="tag">#swingleft</span>
    <span class="tag">#localnews</span>
  </div>
</div>
</body></html>
