<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Semantic colors</title></head><body>
<div class="card">
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#00a8e0"></div><div class="label">Info</div><div class="sub">#00A8E0</div></div>
    <div class="swatch"><div class="chip" style="background:#059669"></div><div class="label">Green</div><div class="sub">#059669</div></div>
    <div class="swatch"><div class="chip" style="background:#2563eb"></div><div class="label">Blue</div><div class="sub">#2563EB</div></div>
    <div class="swatch"><div class="chip" style="background:#d97706"></div><div class="label">Gold</div><div class="sub">#D97706</div></div>
    <div class="swatch"><div class="chip" style="background:#dc2626"></div><div class="label">Error</div><div class="sub">#DC2626</div></div>
    <div class="swatch"><div class="chip" style="background:#f59e0b"></div><div class="label">Warning</div><div class="sub">#F59E0B</div></div>
  </div>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#e0f7ff"></div><div class="label">Info Light</div><div class="sub">#E0F7FF</div></div>
    <div class="swatch"><div class="chip" style="background:#f0fdf4"></div><div class="label">Green Light</div><div class="sub">#F0FDF4</div></div>
    <div class="swatch"><div class="chip" style="background:#eff6ff"></div><div class="label">Blue Light</div><div class="sub">#EFF6FF</div></div>
    <div class="swatch"><div class="chip" style="background:#fffbeb"></div><div class="label">Gold Light</div><div class="sub">#FFFBEB</div></div>
    <div class="swatch"><div class="chip" style="background:#fef2f2"></div><div class="label">Error Light</div><div class="sub">#FEF2F2</div></div>
    <div class="swatch"><div class="chip" style="background:#fffbeb"></div><div class="label">Warn Light</div><div class="sub">#FFFBEB</div></div>
  </div>
</div>
</body></html>
