<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Badges</title></head><body>
<style>
  .bg-row { display:flex; gap:22px; flex-wrap:wrap; }
  .bdg { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .bdg-ring { width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; }
  .bdg-name { font:600 11px 'Archivo'; color:#0a2852; }
</style>
<div class="bg-row">
  <div class="bdg"><div class="bdg-ring" style="background:#00a8e0;box-shadow:0 0 0 2px #fff,0 0 0 4px #00a8e0"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="bdg-name">All In</div></div>
  <div class="bdg"><div class="bdg-ring" style="background:#059669;box-shadow:0 0 0 2px #fff,0 0 0 4px #059669,0 0 0 6px #fff,0 0 0 8px #059669"><span style="font:800 16px 'Archivo'">⚡</span></div><div class="bdg-name">Amplifier · T5</div></div>
  <div class="bdg"><div class="bdg-ring" style="background:#2563eb;box-shadow:0 0 0 2px #fff,0 0 0 4px #2563eb"><span style="font:800 14px 'Archivo'">💬</span></div><div class="bdg-name">Commenter</div></div>
  <div class="bdg"><div class="bdg-ring" style="background:#d97706;box-shadow:0 0 0 2px #fff,0 0 0 4px #d97706"><span style="font:800 10px 'Archivo'">100</span></div><div class="bdg-name">Century</div></div>
  <div class="bdg"><div class="bdg-ring" style="background:#4a6080;box-shadow:0 0 0 2px #fff,0 0 0 4px #4a6080"><span style="font:800 16px 'Archivo'">★</span></div><div class="bdg-name">Veteran</div></div>
</div>
</body></html>
