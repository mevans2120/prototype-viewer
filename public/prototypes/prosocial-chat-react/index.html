<!doctype html>
<html lang="en">
<head>
  <script>
    (function () {
      var hash = (window.location.hash || "").replace(/^#/, "");
      if (!hash) return;
      var overrides = {};
      hash.split("&").forEach(function (p) {
        var i = p.indexOf("=");
        if (i <= 0) return;
        var key = p.slice(0, i);
        var val = decodeURIComponent(p.slice(i + 1));
        if (key === "view") overrides.defaultView = val;
        else if (key === "concept") overrides.defaultConcept = val;
      });
      if (overrides.defaultView) {
        try { window.localStorage.setItem("ps.chat.view", overrides.defaultView); } catch (e) {}
      }
      if (Object.keys(overrides).length === 0) return;
      var current;
      Object.defineProperty(window, "__TWEAKS__", {
        configurable: true,
        enumerable: true,
        get: function () { return current; },
        set: function (v) { current = Object.assign({}, v, overrides); },
      });
    })();
  </script>
  <style>.cx-switcher { display: none !important; }</style>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1400"/>

</head>
